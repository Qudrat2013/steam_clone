{% extends 'base.html' %}
{% block title %}Продать предмет{% endblock %}

{% block content %}
<div style="max-width:600px;margin:20px auto;background:#16202d;color:white;padding:20px;border-radius:12px;">
    <h2>Продать предмет</h2>

    <div style="background:#1b2838;padding:14px;border-radius:10px;margin-bottom:20px;">
        <h3>{{ inventory_item.item.name }}</h3>
        <div style="color:#8f98a0;">{{ inventory_item.item.game.title }}</div>
    </div>

    <form method="post">
        {% csrf_token %}
        <label>Цена:</label>
        <input type="number" step="0.01" name="price" required style="width:100%;padding:12px;border:none;border-radius:8px;background:#1b2838;color:white;margin:10px 0;">
        <button type="submit" style="background:#5c7e10;color:white;border:none;border-radius:8px;padding:12px 18px;">Выставить</button>
    </form>
</div>
{% endblock %}
