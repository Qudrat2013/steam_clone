{% extends 'base.html' %}
{% block title %}Чат с {{ other_user.username }}{% endblock %}

{% block content %}
<div style="max-width:900px;margin:20px auto;background:#16202d;border-radius:12px;padding:20px;color:white;">
    <h2>Чат с {{ other_user.username }}</h2>

    <div id="chat-box" style="height:400px;overflow-y:auto;background:#1b2838;padding:15px;border-radius:10px;margin-bottom:15px;">
        {% for msg in messages_list %}
            <div style="margin-bottom:12px;text-align:{% if msg.sender == request.user %}right{% else %}left{% endif %};">
                <div style="display:inline-block;max-width:70%;padding:10px 14px;border-radius:10px;background:{% if msg.sender == request.user %}#4d8ab5{% else %}#2a475e{% endif %};">
                    {{ msg.text }}
                </div>
            </div>
        {% empty %}
            <p>Сообщений пока нет.</p>
        {% endfor %}
    </div>

    <form method="post">
        {% csrf_token %}
        <div style="display:flex;gap:10px;">
            <input type="text" name="text" placeholder="Введите сообщение..." style="flex:1;padding:12px;border:none;border-radius:8px;background:#1b2838;color:white;" autocomplete="off">
            <button type="submit" style="padding:12px 18px;background:#5c7e10;color:white;border:none;border-radius:8px;">
                Отправить
            </button>
        </div>
    </form>
</div>

<script>
const chatBox = document.getElementById('chat-box');
const messagesUrl = "{% url 'chat_messages_api' other_user.username %}";

function renderMessages(messages) {
    if (!messages.length) {
        chatBox.innerHTML = '<p>Сообщений пока нет.</p>';
        return;
    }

    chatBox.innerHTML = messages.map(msg => `
        <div style="margin-bottom:12px;text-align:${msg.is_mine ? 'right' : 'left'};">
            <div style="display:inline-block;max-width:70%;padding:10px 14px;border-radius:10px;background:${msg.is_mine ? '#4d8ab5' : '#2a475e'};">
                ${escapeHtml(msg.text)}
                <div style="font-size:11px;color:#c7d5e0;margin-top:4px;">${msg.created_at}</div>
            </div>
        </div>
    `).join('');

    chatBox.scrollTop = chatBox.scrollHeight;
}

function escapeHtml(text) {
    const div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

async function loadMessages() {
    try {
        const response = await fetch(messagesUrl);
        const data = await response.json();
        renderMessages(data.messages);
    } catch (e) {
        console.log('chat update error');
    }
}

setInterval(loadMessages, 3000);
chatBox.scrollTop = chatBox.scrollHeight;
</script>
{% endblock %}
