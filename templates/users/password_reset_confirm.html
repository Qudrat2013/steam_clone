{% extends 'base.html' %}
{% block title %}Новый пароль{% endblock %}

{% block content %}
<div class="auth_page">
    <div class="auth_box">
        <div class="auth_title">Введите новый пароль</div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn_steam_green">Сохранить пароль</button>
        </form>
    </div>
</div>
{% endblock %}
