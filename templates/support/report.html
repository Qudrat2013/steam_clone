{% extends 'base.html' %}
{% block title %}Пожаловаться{% endblock %}
{% block content %}
<div class="sp-page" style="max-width:640px;margin:0 auto;padding:24px 16px 60px">
  <a href="{% url 'support_home' %}" style="color:#67c1f5;text-decoration:none">← Поддержка</a>
  <h1 style="color:#fff">Пожаловаться</h1>
  <p style="color:#8f98a0">Сообщите о нарушении правил сообщества. Ложные жалобы могут привести к ограничениям.</p>
  <form method="post" style="background:#16202d;border:1px solid #2a475e;border-radius:8px;padding:24px">
    {% csrf_token %}
    <div style="margin-bottom:14px">
      <label style="display:block;color:#8f98a0;font-size:12px;margin-bottom:4px">Username нарушителя</label>
      <input name="username" value="{% if reported %}{{ reported.username }}{% endif %}" style="width:100%;padding:10px;background:#1b2838;border:1px solid #2a475e;border-radius:6px;color:#fff;box-sizing:border-box" placeholder="username">
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;color:#8f98a0;font-size:12px;margin-bottom:4px">Тип объекта</label>
      <select name="target_type" style="width:100%;padding:10px;background:#1b2838;border:1px solid #2a475e;border-radius:6px;color:#fff">
        {% for val, label in target_types %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
      </select>
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;color:#8f98a0;font-size:12px;margin-bottom:4px">ID объекта (необязательно)</label>
      <input name="target_id" style="width:100%;padding:10px;background:#1b2838;border:1px solid #2a475e;border-radius:6px;color:#fff;box-sizing:border-box">
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;color:#8f98a0;font-size:12px;margin-bottom:4px">Причина</label>
      <select name="reason" style="width:100%;padding:10px;background:#1b2838;border:1px solid #2a475e;border-radius:6px;color:#fff">
        {% for val, label in reasons %}<option value="{{ val }}">{{ label }}</option>{% endfor %}
      </select>
    </div>
    <div style="margin-bottom:14px">
      <label style="display:block;color:#8f98a0;font-size:12px;margin-bottom:4px">Описание</label>
      <textarea name="description" required rows="6" style="width:100%;padding:10px;background:#1b2838;border:1px solid #2a475e;border-radius:6px;color:#fff;box-sizing:border-box;font-family:inherit"></textarea>
    </div>
    <button type="submit" style="background:#a34c25;color:#fff;border:none;padding:12px 24px;border-radius:4px;font-weight:700;cursor:pointer">Отправить жалобу</button>
  </form>
</div>
{% endblock %}
